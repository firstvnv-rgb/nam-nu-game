<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Bomberman Cute PvP - 3 Màn Chơi</title>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.55.2/dist/phaser.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.5.4/dist/socket.io-client.min.js"></script>
    <style>
        body { 
            margin: 0; 
            background-color: #1a1a2e; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: flex-start; 
            padding: 10px;
            min-height: 100vh; 
            overflow-x: hidden;
            overflow-y: auto;
            color: #fff; 
            user-select: none; 
            box-sizing: border-box;
        }
        #header-info { 
            width: 100%; 
            max-width: 480px; 
            display: flex; 
            justify-content: space-around; 
            padding: 12px 0; 
            font-weight: bold; 
            font-size: 16px; 
            background: rgba(255,255,255,0.1); 
            border-radius: 8px; 
            margin-bottom: 10px; 
            box-shadow: 0 4px 10px rgba(0,0,0,0.3); 
        }
        /* Khung chứa Game - Sử dụng min-height cố định khoảng trống an toàn tuyệt đối */
        .game-wrapper {
            position: relative;
            width: 100%;
            max-width: 480px;
            height: 352px;
            min-height: 352px;
            border: 4px solid #e94560; 
            border-radius: 12px; 
            overflow: hidden; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.5); 
            background: #16161a;
            box-sizing: border-box;
        }
        #game-container {
            width: 100%;
            height: 100%;
        }
        /* Màn hình phủ bắt buộc ép chặt phủ kín 100% diện tích wrapper cha */
        .overlay-screen { 
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(22, 22, 26, 0.98); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            z-index: 999; 
            padding: 20px; 
            box-sizing: border-box; 
            text-align: center; 
        }
        .btn { 
            background: linear-gradient(45deg, #ff416c, #ff4b2b); 
            border: none; 
            color: white; 
            padding: 12px 28px; 
            font-size: 16px; 
            font-weight: bold; 
            border-radius: 25px; 
            cursor: pointer; 
            margin-top: 15px; 
            box-shadow: 0 5px 15px rgba(255,65,108,0.4); 
            transition: transform 0.2s; 
        }
        .btn:active { transform: scale(0.95); }
        .hidden { display: none !important; }
        #popup-title { font-size: 26px; font-weight: bold; margin-bottom: 5px; }
        #popup-reward { 
            font-size: 14px; 
            color: #f9d423; 
            background: rgba(255,215,0,0.1); 
            padding: 10px; 
            border-radius: 8px; 
            border: 1px dashed #f9d423; 
            max-width: 90%; 
            margin: 8px 0; 
            line-height: 1.4; 
        }
        /* Khu vực nút bấm điều khiển độc lập ở phía dưới */
        #control-pad { 
            width: 100%; 
            max-width: 480px; 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
            padding: 15px; 
            box-sizing: border-box; 
            margin-top: 10px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
        }
        .ctrl-btn { 
            background: #1f4068; 
            border: 2px solid #162447; 
            border-radius: 15px; 
            color: white; 
            font-size: 26px; 
            font-weight: bold; 
            height: 60px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.2); 
            touch-action: none; 
        }
        .ctrl-btn:active { background: #e94560; }
        #btn-bomb { background: #e94560; border-color: #ff416c; grid-column: 3; font-size: 18px; }
    </style>
</head>
<body>

    <div id="header-info">
        <div>MÀN CHƠI: <span id="txt-level" style="color:#f9d423;">1</span></div>
        <div>HIỆP ĐẤU: <span id="txt-round" style="color:#00fff5;">1/3</span></div>
    </div>

    <div class="game-wrapper">
        <div id="select-screen" class="overlay-screen">
            <h2 style="color: #e94560; margin: 0 0 5px 0; font-size: 26px; letter-spacing: 1px;">BOMBERMAN CUTE</h2>
            <p style="color: #aaa; margin: 0 0 15px 0; font-size:14px;">Chế độ: Đấu Trường 3 Cấp Độ</p>
            <div style="display: flex; gap: 15px;">
                <button class="btn" onclick="joinAs('nam')" style="background: linear-gradient(45deg, #00c6ff, #0072ff); margin-top: 0;">Hoàng Tử (Nam)</button>
                <button class="btn" onclick="joinAs('nu')" style="background: linear-gradient(45deg, #f857a6, #ff5858); margin-top: 0;">Công Chúa (Nữ)</button>
            </div>
        </div>

        <div id="result-screen" class="overlay-screen hidden">
            <div id="popup-title">KẾT QUẢ</div>
            <div style="font-size:13px; color:#aaa; margin-top:3px;">Phần thưởng giao kèo ván này:</div>
            <div id="popup-reward">Nội dung phần thưởng</div>
            <button id="btn-next-match" class="btn">XÁC NHẬN CHƠI TIẾP</button>
        </div>

        <div id="game-container"></div>
    </div>

    <div id="control-pad">
        <div></div>
        <div class="ctrl-btn" id="btn-up">▲</div>
        <div></div>
        <div class="ctrl-btn" id="btn-left">◀</div>
        <div class="ctrl-btn" id="btn-down">▼</div>
        <div class="ctrl-btn" id="btn-right">▶</div>
        <div></div>
        <div></div>
        <div class="ctrl-btn" id="btn-bomb">💣 Đặt Bom</div>
    </div>

    <script>
        // Liên kết tới Server Render của bạn
        const socket = io("https://mushroom-server.onrender.com"); 

        let myGender = null;
        let config = {
            type: Phaser.AUTO,
            width: 480,
            height: 352,
            parent: 'game-container',
            scene: { preload: preload, create: create, update: update }
        };

        let game = new Phaser.Game(config);
        let sceneContext;
        let cells = [];
        let remotePlayers = {};
        let localMonsters = {};
        let localMushrooms = {};
        let localItems = {};
        const TILE_SIZE = 32;

        function preload() {
            let canvas = this.textures.createCanvas('block_stone', 32, 32);
            let ctx = canvas.context; ctx.fillStyle = '#4a4e69'; ctx.fillRect(0,0,32,32); ctx.fillStyle = '#22223b'; ctx.fillRect(2,2,28,28); canvas.refresh();

            canvas = this.textures.createCanvas('block_wood', 32, 32);
            ctx = canvas.context; ctx.fillStyle = '#b5838d'; ctx.fillRect(0,0,32,32); ctx.fillStyle = '#e5989b'; ctx.fillRect(4,4,24,24); canvas.refresh();

            canvas = this.textures.createCanvas('hero_nam', 26, 26);
            ctx = canvas.context; ctx.fillStyle = '#00b4d8'; ctx.beginPath(); ctx.arc(13,13,12,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#fff'; ctx.fillRect(6,6,4,6); ctx.fillRect(16,6,4,6); canvas.refresh();

            canvas = this.textures.createCanvas('hero_nu', 26, 26);
            ctx = canvas.context; ctx.fillStyle = '#ffb3c1'; ctx.beginPath(); ctx.arc(13,13,12,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#ff4d6d'; ctx.beginPath(); ctx.arc(13,4,6,0,Math.PI*2); ctx.fill(); canvas.refresh();

            canvas = this.textures.createCanvas('monster', 24, 24);
            ctx = canvas.context; ctx.fillStyle = '#7209b7'; ctx.fillRect(0,0,24,24); ctx.fillStyle = '#f72585'; ctx.fillRect(4,4,16,16); canvas.refresh();

            canvas = this.textures.createCanvas('shroom', 26, 26);
            ctx = canvas.context; ctx.fillStyle = '#f9c74f'; ctx.beginPath(); ctx.arc(13,13,11,0,Math.PI*2); ctx.fill(); ctx.fillStyle = '#f94144'; ctx.fillRect(10,10,6,12); canvas.refresh();

            canvas = this.textures.createCanvas('item_speed', 20, 20);
            ctx = canvas.context; ctx.fillStyle = '#43aa8b'; ctx.fillRect(0,0,20,20); canvas.refresh();

            canvas = this.textures.createCanvas('item_heal', 20, 20);
            ctx = canvas.context; ctx.fillStyle = '#f94144'; ctx.fillRect(4,0,12,20); ctx.fillRect(0,4,20,12); canvas.refresh();
        }

        function create() {
            sceneContext = this;

            socket.on('initGame', (data) => { drawGrid(data.grid, data.level); updateHeader(data.level, data.round); });
            socket.on('resetMatch', (data) => {
                drawGrid(data.grid, data.level); updateHeader(data.level, data.round);
                document.getElementById('result-screen').classList.add('hidden');
                for (let id in localMonsters) { localMonsters[id].destroy(); } localMonsters = {};
                for (let k in localMushrooms) { localMushrooms[k].destroy(); } localMushrooms = {};
                for (let k in localItems) { localItems[k].destroy(); } localItems = {};
            });

            socket.on('updatePlayers', (serverPlayers) => {
                for (let id in serverPlayers) {
                    let sp = serverPlayers[id];
                    if (sp.hp <= 0) {
                        if (remotePlayers[id]) { remotePlayers[id].destroy(); delete remotePlayers[id]; }
                        continue;
                    }
                    let key = sp.gender === 'nam' ? 'hero_nam' : 'hero_nu';
                    if (!remotePlayers[id]) {
                        remotePlayers[id] = sceneContext.add.sprite(sp.gridX * TILE_SIZE + 16, sp.gridY * TILE_SIZE + 16, key).setZ(5);
                    } else {
                        sceneContext.tweens.add({ targets: remotePlayers[id], x: sp.gridX * TILE_SIZE + 16, y: sp.gridY * TILE_SIZE + 16, duration: 100 });
                    }
                }
                for (let id in remotePlayers) { if (!serverPlayers[id]) { remotePlayers[id].destroy(); delete remotePlayers[id]; } }
            });

            socket.on('updateMonsters', (serverMonsters) => {
                serverMonsters.forEach(sm => {
                    if (!localMonsters[sm.id]) {
                        localMonsters[sm.id] = sceneContext.add.sprite(sm.gridX * TILE_SIZE + 16, sm.gridY * TILE_SIZE + 16, 'monster').setZ(4);
                    } else {
                        sceneContext.tweens.add({ targets: localMonsters[sm.id], x: sm.gridX * TILE_SIZE + 16, y: sm.gridY * TILE_SIZE + 16, duration: 120 });
                    }
                });
                for (let id in localMonsters) {
                    if (!serverMonsters.find(m => m.id === id)) { localMonsters[id].destroy(); delete localMonsters[id]; }
                }
            });

            socket.on('mushroomPlaced', (shroom) => {
                let k = `${shroom.gridX}_${shroom.gridY}`;
                if (!localMushrooms[k]) {
                    localMushrooms[k] = sceneContext.add.sprite(shroom.gridX * TILE_SIZE + 16, shroom.gridY * TILE_SIZE + 16, 'shroom').setZ(3);
                }
            });

            socket.on('mushroomExploded', (data) => {
                let k = data.shroom.id; if (localMushrooms[k]) { localMushrooms[k].destroy(); delete localMushrooms[k]; }
                data.explodedTiles.forEach(tile => {
                    let ef = sceneContext.add.rectangle(tile.x * TILE_SIZE + 16, tile.y * TILE_SIZE + 16, 28, 28, 0xf94144, 0.8).setZ(6);
                    sceneContext.tweens.add({ targets: ef, alpha: 0, duration: 300, onComplete: () => ef.destroy() });
                });
                drawGrid(data.newGrid, document.getElementById('txt-level').innerText * 1);
            });

            socket.on('updateItems', (serverItems) => {
                for (let k in localItems) { localItems[k].destroy(); } localItems = {};
                for (let k in serverItems) {
                    let it = serverItems[k];
                    let img = it.type === 'speed' ? 'item_speed' : 'item_heal';
                    localItems[k] = sceneContext.add.sprite(it.x * TILE_SIZE + 16, it.y * TILE_SIZE + 16, img).setZ(2);
                }
            });

            socket.on('hurtEffect', () => { sceneContext.cameras.main.flash(150, 255, 0, 0); });
            socket.on('gameWin', (info) => { showEndPopup("CHIẾN THẮNG 🎉", info.rewardText, true); });
            socket.on('gameOver', () => { showEndPopup("THẤT BẠI 💔", "Bạn đã ngã xuống trước đối phương!", false); });

            setupControls();
        }

        function update() {}

        function drawGrid(grid, level = 1) {
            cells.forEach(c => c.destroy()); cells = [];
            let woodColor = level === 1 ? 0xe5989b : (level === 2 ? 0xf4a261 : 0x9a7b56);
            for (let y = 0; y < 11; y++) {
                for (let x = 0; x < 15; x++) {
                    let val = grid[y][x];
                    if (val === 1) {
                        let wall = sceneContext.add.sprite(x * TILE_SIZE + 16, y * TILE_SIZE + 16, 'block_stone'); cells.push(wall);
                    } else if (val === 2) {
                        let wood = sceneContext.add.sprite(x * TILE_SIZE + 16, y * TILE_SIZE + 16, 'block_wood').setTint(woodColor); cells.push(wood);
                    }
                }
            }
        }

        function updateHeader(lvl, rnd) {
            document.getElementById('txt-level').innerText = lvl;
            document.getElementById('txt-round').innerText = rnd + "/3";
        }

        function showEndPopup(title, rewardText, isWin) {
            document.getElementById('popup-title').innerText = title;
            document.getElementById('popup-title').style.color = isWin ? "#43aa8b" : "#e94560";
            document.getElementById('popup-reward').innerText = rewardText;
            let btn = document.getElementById('btn-next-match');
            btn.onclick = () => { socket.emit('nextMatchRequest', isWin); };
            document.getElementById('result-screen').classList.remove('hidden');
        }

        function joinAs(gender) {
            myGender = gender;
            document.getElementById('select-screen').classList.add('hidden');
            socket.emit('joinGame', gender);
        }

        function setupControls() {
            document.getElementById('btn-up').onmousedown = () => socket.emit('requestMove', { dirX: 0, dirY: -1 });
            document.getElementById('btn-down').onmousedown = () => socket.emit('requestMove', { dirX: 0, dirY: 1 });
            document.getElementById('btn-left').onmousedown = () => socket.emit('requestMove', { dirX: -1, dirY: 0 });
            document.getElementById('btn-right').onmousedown = () => socket.emit('requestMove', { dirX: 1, dirY: 0 });
            document.getElementById('btn-bomb').onmousedown = () => socket.emit('requestPlant');

            document.getElementById('btn-up').ontouchstart = (e) => { e.preventDefault(); socket.emit('requestMove', { dirX: 0, dirY: -1 }); }
            document.getElementById('btn-down').ontouchstart = (e) => { e.preventDefault(); socket.emit('requestMove', { dirX: 0, dirY: 1 }); }
            document.getElementById('btn-left').ontouchstart = (e) => { e.preventDefault(); socket.emit('requestMove', { dirX: -1, dirY: 0 }); }
            document.getElementById('btn-right').ontouchstart = (e) => { e.preventDefault(); socket.emit('requestMove', { dirX: 1, dirY: 0 }); }
            document.getElementById('btn-bomb').ontouchstart = (e) => { e.preventDefault(); socket.emit('requestPlant'); }
        }
    </script>
</body>
</html>
