<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nấm Tình Yêu Pro V2</title>
    <style>
        body { margin: 0; padding: 0; background: #111; font-family: sans-serif; overflow: hidden; user-select: none; }
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; background: #1a1a24; }
        .btn { padding: 15px 40px; font-size: 20px; font-weight: bold; border: none; border-radius: 30px; margin: 15px; color: white; box-shadow: 0 5px 15px rgba(0,0,0,0.4); }
        .btn-nam { background: linear-gradient(45deg, #00c6ff, #0072ff); }
        .btn-nu { background: linear-gradient(45deg, #f857a6, #ff5858); }
        #ui-layer { position: absolute; top: 10px; left: 10px; color: white; font-size: 14px; pointer-events: none; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px; width: calc(100% - 40px); z-index: 10; }
        #btn-plant { position: absolute; bottom: 30px; right: 30px; width: 85px; height: 85px; background: radial-gradient(#ff6600, #cc3300); border-radius: 50%; border: 3px solid #fff; color: white; font-weight: bold; font-size: 16px; z-index: 10; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>

    <div id="lobby">
        <h1 style="color: #ffeb3b; text-shadow: 0 0 10px #ff9800;">ĐẶT NẤM & DIỆT QUÁI</h1>
        <button class="btn btn-nam" onclick="startGame('nam')">HOÀNG TỬ (NAM)</button>
        <button class="btn btn-nu" onclick="startGame('nu')">CÔNG CHÚA (NỮ)</button>
    </div>

    <div id="ui-layer" style="display: none;">
        <div id="info-level" style="font-weight: bold; color: #ffeb3b; font-size: 16px;">Cửa: 1 - Hiệp: 1</div>
        <div id="info-reward" style="color: #00ffcc; margin-top: 2px;">Phần thưởng: Đang tải...</div>
        <div id="info-status" style="color: #ff9999; margin-top: 2px; font-weight: bold;">MÁU: 100/100</div>
    </div>
    
    <button id="btn-plant" style="display: none;" onclick="handlePlant()">ĐẶT<br>NẤM</button>

    <script>
        // === ⚠️ NHỚ THAY ĐƯỜNG LINK RENDER CỦA BẠN VÀO ĐÂY VÌ LINK DƯỚI CHỈ LÀ VÍ DỤ ===
        const socket = io("https://mushroom-server.onrender.com");

        let myGender = null;
        let sceneContext = null;
        let localPlayer = null;
        let remotePlayer = null;
        let bricksGroup, monstersGroup, mushroomsGroup;
        let joystick = { active: false, startX: 0, startY: 0, moveX: 0, moveY: 0 };
        let lastDamageTime = 0;

        function startGame(gender) {
            myGender = gender;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('btn-plant').style.display = 'block';
            
            initPhaser();
            socket.emit('joinGame', gender);
        }

        function initPhaser() {
            const config = {
                type: Phaser.AUTO,
                width: window.innerWidth,
                height: window.innerHeight,
                parent: document.body,
                physics: { default: 'arcade', arcade: { debug: false } },
                scene: { preload: preload, create: create, update: update }
            };
            new Phaser.Game(config);
        }

        function preload() {
            sceneContext = this;

            // Tự vẽ texture Tường Gạch màu Cam Đỏ siêu chất
            let canvasBrick = document.createElement('canvas'); canvasBrick.width = 40; canvasBrick.height = 40;
            let ctx = canvasBrick.getContext('2d'); ctx.fillStyle = '#cc4422'; ctx.fillRect(0,0,40,40);
            ctx.strokeStyle = '#fff'; ctx.lineWidth = 2; ctx.strokeRect(0,0,40,40);
            this.textures.addCanvas('brick', canvasBrick);

            // Tự vẽ Quái Vật màu Tím phát sáng độc hại
            let canvasMonster = document.createElement('canvas'); canvasMonster.width = 30; canvasMonster.height = 30;
            ctx = canvasMonster.getContext('2d'); ctx.fillStyle = '#9c27b0'; ctx.beginPath(); ctx.arc(15,15,15,0,Math.PI*2); ctx.fill();
            ctx.fillStyle = '#fff'; ctx.fillRect(6,8,5,5); ctx.fillRect(19,8,5,5); // Mắt quái
            this.textures.addCanvas('monster', canvasMonster);

            // Các texture người chơi và nấm từ bản trước
            let canvasNam = document.createElement('canvas'); canvasNam.width = 32; canvasNam.height = 32;
            ctx = canvasNam.getContext('2d'); ctx.fillStyle = '#00c6ff'; ctx.beginPath(); ctx.arc(16,16,16,0,Math.PI*2); ctx.fill();
            this.textures.addCanvas('p_nam', canvasNam);

            let canvasNu = document.createElement('canvas'); canvasNu.width = 32; canvasNu.height = 32;
            ctx = canvasNu.getContext('2d'); ctx.fillStyle = '#ff5858'; ctx.beginPath(); ctx.arc(16,16,16,0,Math.PI*2); ctx.fill();
            this.textures.addCanvas('p_nu', canvasNu);

            let canvasShroom = document.createElement('canvas'); canvasShroom.width = 24; canvasShroom.height = 24;
            ctx = canvasShroom.getContext('2d'); ctx.fillStyle = '#f1c40f'; ctx.beginPath(); ctx.arc(12,10,12,0,Math.PI*2); ctx.fill();
            this.textures.addCanvas('shroom', canvasShroom);
        }

        function create() {
            bricksGroup = this.physics.add.staticGroup();
            monstersGroup = this.physics.add.group();
            mushroomsGroup = this.physics.add.group();

            // Vẽ nền tối
            this.cameras.main.setBackgroundColor('#14141f');

            // Cài đặt Joystick chạm màn hình bên trái để di chuyển
            this.input.on('pointerdown', (pointer) => {
                if (pointer.x < window.innerWidth / 2) {
                    joystick.active = true; joystick.startX = pointer.x; joystick.startY = pointer.y;
                }
            });
            this.input.on('pointermove', (pointer) => {
                if (joystick.active) { joystick.moveX = pointer.x - joystick.startX; joystick.moveY = pointer.y - joystick.startY; }
            });
            this.input.on('pointerup', () => { joystick.active = false; joystick.moveX = 0; joystick.moveY = 0; });

            // SỰ KIỆN TỪ SERVER
            socket.on('initLevel', (data) => {
                document.getElementById('info-level').innerText = `Cửa: ${data.level} - Hiệp: ${data.round}`;
                document.getElementById('info-reward').innerText = `Thắng được: ${myGender === 'nam' ? data.reward.nam : data.reward.nu}`;
                
                // Vẽ tường gạch lên bản đồ từ dữ liệu server gửi về
                bricksGroup.clear(true, true);
                data.bricks.forEach(b => { bricksGroup.create(b.x, b.y, 'brick'); });
            });

            socket.on('updatePlayers', (serverPlayers) => {
                for (let id in serverPlayers) {
                    let p = serverPlayers[id];
                    if (id === socket.id) {
                        if (!localPlayer) {
                            localPlayer = sceneContext.physics.add.sprite(p.x, p.y, `p_${p.gender}`);
                            localPlayer.setCollideWorldBounds(true);
                            // Bật tính năng va chạm CHẶN KHÔNG CHO ĐI XUYÊN TƯỜNG
                            sceneContext.physics.add.collider(localPlayer, bricksGroup);
                        } else {
                            localPlayer.setPosition(p.x, p.y);
                        }
                        document.getElementById('info-status').innerText = `MÁU CỦA BẠN: ${p.hp}/100 | Lực bom: ${p.power}`;
                    } else {
                        if (!remotePlayer) {
                            remotePlayer = sceneContext.add.sprite(p.x, p.y, `p_${p.gender}`);
                            remotePlayer.id = id;
                        } else {
                            remotePlayer.setPosition(p.x, p.y);
                        }
                    }
                }
            });

            socket.on('playerMoved', (data) => {
                if (remotePlayer && remotePlayer.id === data.id) remotePlayer.setPosition(data.x, data.y);
            });

            // Đồng bộ vị trí quái vật từ server liên tục
            socket.on('updateMonsters', (serverMonsters) => {
                monstersGroup.clear(true, true);
                serverMonsters.forEach(m => {
                    let mon = monstersGroup.create(m.x, m.y, 'monster');
                    mon.id = m.id;
                });
            });

            socket.on('mushroomPlaced', (shroom) => {
                let m = sceneContext.physics.add.sprite(shroom.x, shroom.y, 'shroom');
                m.id = shroom.id; m.owner = shroom.owner; m.power = shroom.power;
                mushroomsGroup.add(m);
            });

            socket.on('mushroomExploded', (shroom) => {
                mushroomsGroup.getChildren().forEach(m => {
                    if (m && m.id === shroom.id) {
                        let circle = sceneContext.add.circle(m.x, m.y, 10, 0xff5500, 0.7);
                        sceneContext.tweens.add({
                            targets: circle, radius: 75, alpha: 0, duration: 250,
                            onComplete: () => circle.destroy()
                        });

                        // Nếu dính bom nấm của đối phương
                        if (localPlayer && Phaser.Math.Distance.Between(localPlayer.x, localPlayer.y, m.x, m.y) < 75) {
                            if (m.owner !== socket.id) socket.emit('takeDamage', { amount: m.power });
                        }
                        m.destroy();
                    }
                });
            });

            socket.on('gameOver', (data) => { alert(`KẾT THÚC CỬA!\nNgười Thắng: ${data.winner.toUpperCase()}\nHành động: ${data.reward}`); });

            socket.on('resetMatch', (data) => {
                document.getElementById('info-level').innerText = `Cửa: ${data.level} - Hiệp: ${data.round}`;
                document.getElementById('info-reward').innerText = `Thắng được: ${myGender === 'nam' ? data.reward.nam : data.reward.nu}`;
            });
        }

        function update() {
            if (localPlayer && joystick.active) {
                let speed = 180;
                let angle = Math.atan2(joystick.moveY, joystick.moveX);
                localPlayer.body.setVelocity(Math.cos(angle) * speed, Math.sin(angle) * speed);
                socket.emit('playerMove', { x: localPlayer.x, y: localPlayer.y });
            } else if (localPlayer) {
                localPlayer.body.setVelocity(0, 0);
            }

            // Kiểm tra va chạm với Quái vật (Nếu đụng quái, cứ mỗi 0.5s trừ 10 máu)
            if (localPlayer && monstersGroup.getChildren().length > 0) {
                monstersGroup.getChildren().forEach(monster => {
                    if (Phaser.Math.Distance.Between(localPlayer.x, localPlayer.y, monster.x, monster.y) < 25) {
                        let now = Date.now();
                        if (now - lastDamageTime > 500) {
                            lastDamageTime = now;
                            socket.emit('takeDamage', { amount: 10 });
                            sceneContext.cameras.main.flash(100, 255, 0, 0); // Nháy đỏ màn hình khi bị cắn
                        }
                    }
                });
            }
        }

        function handlePlant() {
            if (localPlayer) socket.emit('placeMushroom', { x: localPlayer.x, y: localPlayer.y });
        }
    </script>
</body>
</html>
