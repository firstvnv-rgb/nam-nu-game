<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Bomberman Siêu Cấp V6.0</title>
    <style>
        body { margin: 0; padding: 0; background: #111; font-family: sans-serif; overflow: hidden; user-select: none; }
        #lobby { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; color: white; background: #0f172a; text-align: center; }
        .btn { padding: 15px 35px; font-size: 18px; font-weight: bold; border: none; border-radius: 30px; margin: 10px; color: white; width: 250px; }
        .btn-nam { background: #0284c7; } .btn-nu { background: #db2777; }
        #ui-layer { position: absolute; top: 10px; left: 10px; right: 10px; color: white; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; z-index: 10; font-size: 15px; text-align: center; }
        #control-container { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; z-index: 99; }
        .dpad { display: grid; grid-template-columns: repeat(3, 55px); grid-template-rows: repeat(3, 55px); gap: 5px; }
        .dpad-btn { background: #334155; color: white; font-weight: bold; font-size: 20px; border-radius: 10px; display: flex; align-items: center; justify-content: center; border: 1px solid #475569; }
        #btn-plant { width: 85px; height: 85px; background: #dc2626; border-radius: 50%; border: 3px solid #fff; color: white; font-weight: bold; font-size: 16px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.60.0/dist/phaser.min.js"></script>
    <script src="https://cdn.socket.io/4.6.1/socket.io.min.js"></script>
</head>
<body>

    <div id="lobby">
        <h1 style="color: #f59e0b;">BOMBERMAN V6.0</h1>
        <p>Sửa lỗi hiển thị đen màn hình cực chuẩn</p>
        <button class="btn btn-nam" onclick="startGame('nam')">HOÀNG TỬ (NAM)</button>
        <button class="btn btn-nu" onclick="startGame('nu')">CÔNG CHÚA (NỮ)</button>
    </div>

    <div id="ui-layer" style="display: none;">
        <div id="info-level" style="color: #fbbf24; font-weight: bold;">Cửa: 1 - Hiệp: 1</div>
        <div id="info-reward" style="color: #34d399;">Phần thưởng: Đang tải...</div>
        <div id="info-status" style="color: #f87171; font-weight: bold; margin-top: 3px;">MÁU: 100/100</div>
    </div>
    
    <div id="control-container" style="display: none;">
        <div class="dpad">
            <div></div><div class="dpad-btn" id="key-up">▲</div><div></div>
            <div class="dpad-btn" id="key-left">◀</div><div></div><div class="dpad-btn" id="key-right">▶</div>
            <div></div><div class="dpad-btn" id="key-down">▼</div><div></div>
        </div>
        <button id="btn-plant" onclick="handlePlant()">ĐẶT<br>BOM</button>
    </div>

    <script>
        const socket = io("https://mushroom-server.onrender.com");
        let myGender = null, sceneContext = null;
        let pSprites = {}, mSprites = {}, shroomSprites = {}, itemSprites = {};
        let currentGrid = [];
        let TILE_SIZE = 0; let MAP_OFFSET_Y = 100;
        let lastMoveTime = 0; let moveDelay = 250; // Tốc độ di chuyển mặc định theo ô (ms)

        function startGame(gender) {
            myGender = gender;
            document.getElementById('lobby').style.display = 'none';
            document.getElementById('ui-layer').style.display = 'block';
            document.getElementById('control-container').style.display = 'flex';
            initPhaser(); setupDpadEvents();
            socket.emit('joinGame', gender);
        }

        function initPhaser() {
            TILE_SIZE = Math.floor(window.innerWidth / 15);
            const config = {
                type: Phaser.AUTO, width: window.innerWidth, height: window.innerHeight, parent: document.body,
                scene: { preload: preload, create: create }
            };
            new Phaser.Game(config);
        }

        function preload() {
            sceneContext = this;
            // Vẽ đồ họa hình khối tránh lỗi thiếu file ảnh nền
            let createText = (key, color, isCircle=false) => {
                let canvas = document.createElement('canvas'); canvas.width = TILE_SIZE; canvas.height = TILE_SIZE;
                let ctx = canvas.getContext('2d'); ctx.fillStyle = color;
                if(isCircle) { ctx.beginPath(); ctx.arc(TILE_SIZE/2, TILE_SIZE/2, TILE_SIZE*0.4, 0, Math.PI*2); ctx.fill(); }
                else { ctx.fillRect(0,0,TILE_SIZE,TILE_SIZE); }
                this.textures.addCanvas(key, canvas);
            };
            createText('bg_grass', '#4caf50'); createText('stone', '#1e293b'); createText('brick', '#d97706');
            createText('p_nam', '#0ea5e9', true); createText('p_nu', '#ec4899', true); createText('monster', '#a855f7', true);
            createText('shroom', '#eab308', true); createText('item_speed', '#10b981'); createText('item_heal', '#ef4444');
        }

        function create() {
            socket.on('initGame', (data) => { currentGrid = data.grid; drawMap(); updateUI(data); });

            socket.on('updatePlayers', (serverPlayers) => {
                // Xóa sprite cũ vẽ sprite mới theo Grid chuẩn xác
                for (let id in pSprites) { pSprites[id].destroy(); } pSprites = {};
                for (let id in serverPlayers) {
                    let p = serverPlayers[id];
                    let px = p.gridX * TILE_SIZE + TILE_SIZE/2;
                    let py = p.gridY * TILE_SIZE + TILE_SIZE/2 + MAP_OFFSET_Y;
                    pSprites[id] = sceneContext.add.sprite(px, py, `p_${p.gender}`).setDepth(10);
                    if (id === socket.id) {
                        document.getElementById('info-status').innerText = `MÁU CỦA BẠN: ${p.hp}/100`;
                    }
                }
            });

            socket.on('playerBuff', (data) => { if(data.type === 'speed') moveDelay = Math.max(120, moveDelay - 30); });
            socket.on('hurtEffect', () => { sceneContext.cameras.main.flash(100, 255, 0, 0); });

            socket.on('updateMonsters', (serverMonsters) => {
                for (let id in mSprites) { mSprites[id].destroy(); } mSprites = {};
                serverMonsters.forEach(m => {
                    let mx = m.gridX * TILE_SIZE + TILE_SIZE/2;
                    let my = m.gridY * TILE_SIZE + TILE_SIZE/2 + MAP_OFFSET_Y;
                    mSprites[m.id] = sceneContext.add.sprite(mx, my, 'monster').setDepth(9);
                });
                checkMonsterCollision(serverMonsters);
            });

            socket.on('updateItems', (serverItems) => {
                for (let key in itemSprites) { itemSprites[key].destroy(); } itemSprites = {};
                for (let key in serverItems) {
                    let it = serverItems[key];
                    let ix = it.x * TILE_SIZE + TILE_SIZE/2;
                    let iy = it.y * TILE_SIZE + TILE_SIZE/2 + MAP_OFFSET_Y;
                    itemSprites[key] = sceneContext.add.sprite(ix, iy, `item_${it.type}`).setDepth(5).setScale(0.7);
                }
            });

            socket.on('mushroomPlaced', (shroom) => {
                let sx = shroom.gridX * TILE_SIZE + TILE_SIZE/2;
                let sy = shroom.gridY * TILE_SIZE + TILE_SIZE/2 + MAP_OFFSET_Y;
                shroomSprites[shroom.id] = sceneContext.add.sprite(sx, sy, 'shroom').setDepth(8);
            });

            socket.on('mushroomExploded', (data) => {
                if (shroomSprites[data.shroom.id]) { shroomSprites[data.shroom.id].destroy(); delete shroomSprites[data.shroom.id]; }
                data.explodedTiles.forEach(tile => {
                    let fx = tile.x * TILE_SIZE + TILE_SIZE/2; let fy = tile.y * TILE_SIZE + TILE_SIZE/2 + MAP_OFFSET_Y;
                    let fire = sceneContext.add.circle(fx, fy, TILE_SIZE/2 - 2, 0xf97316, 0.8).setDepth(11);
                    sceneContext.tweens.add({ targets: fire, alpha: 0, duration: 300, onComplete: () => fire.destroy() });
                });
                currentGrid = data.newGrid; drawMap();
            });

            socket.on('gameOver', (data) => { alert(`KẾT THÚC VÒNG ĐẤU!\nNgười chiến thắng: ${data.winner.toUpperCase()}\nThưởng: ${data.reward}`); });
            socket.on('resetMatch', (data) => { moveDelay = 250; currentGrid = data.grid; drawMap(); updateUI(data); });
        }

        function drawMap() {
            if(!currentGrid || currentGrid.length === 0) return;
            sceneContext.children.list.forEach(child => { if(child.texture && ['stone','brick','bg_grass'].includes(child.texture.key)) child.destroy(); });
            
            for (let y = 0; y < currentGrid.length; y++) {
                for (let x = 0; x < currentGrid[y].length; x++) {
                    let px = x * TILE_SIZE + TILE_SIZE/2; let py = y * TILE_SIZE + TILE_SIZE/2 + MAP_OFFSET_Y;
                    sceneContext.add.sprite(px, py, 'bg_grass').setDepth(1);
                    if (currentGrid[y][x] === 1) sceneContext.add.sprite(px, py, 'stone').setDepth(2);
                    else if (currentGrid[y][x] === 2) sceneContext.add.sprite(px, py, 'brick').setDepth(3);
                }
            }
        }

        function updateUI(data) {
            document.getElementById('info-level').innerText = `Cửa: ${data.level} - Hiệp: ${data.round}`;
            document.getElementById('info-reward').innerText = `Phần thưởng: ${myGender === 'nam' ? data.reward.nam : data.reward.nu}`;
        }

        function setupDpadEvents() {
            const handleMove = (dx, dy) => {
                let now = Date.now(); if (now - lastMoveTime < moveDelay) return;
                let mySprite = pSprites[socket.id]; if (!mySprite) return;
                
                let curGridX = Math.round((mySprite.x - TILE_SIZE/2) / TILE_SIZE);
                let curGridY = Math.round((mySprite.y - MAP_OFFSET_Y - TILE_SIZE/2) / TILE_SIZE);
                let nX = curGridX + dx; let nY = curGridY + dy;

                if (nY >= 0 && nY < 11 && nX >= 0 && nX < 15 && currentGrid[nY][nX] === 0) {
                    lastMoveTime = now;
                    socket.emit('playerMove', { gridX: nX, gridY: nY });
                }
            };
            document.getElementById('key-up').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(0, -1); });
            document.getElementById('key-down').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(0, 1); });
            document.getElementById('key-left').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(-1, 0); });
            document.getElementById('key-right').addEventListener('touchstart', (e) => { e.preventDefault(); handleMove(1, 0); });
        }

        function checkMonsterCollision(monsters) {
            let mySprite = pSprites[socket.id]; if (!mySprite) return;
            let curGridX = Math.round((mySprite.x - TILE_SIZE/2) / TILE_SIZE);
            let curGridY = Math.round((mySprite.y - MAP_OFFSET_Y - TILE_SIZE/2) / TILE_SIZE);
            monsters.forEach(m => {
                if (m.gridX === curGridX && m.gridY === curGridY) {
                    socket.emit('takeDamage', { amount: 15 });
                }
            });
        }

        function handlePlant() {
            let mySprite = pSprites[socket.id]; if (!mySprite) return;
            let curGridX = Math.round((mySprite.x - TILE_SIZE/2) / TILE_SIZE);
            let curGridY = Math.round((mySprite.y - MAP_OFFSET_Y - TILE_SIZE/2) / TILE_SIZE);
            socket.emit('placeMushroom', { gridX: curGridX, gridY: curGridY });
        }
    </script>
</body>
</html>
